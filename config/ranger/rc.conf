# Let tmux handle mouse drag selection/copy inside ranger too.
set mouse_enabled false

# Use two columns instead of the default three so ranger stays readable inside
# narrow tmux splits, while giving the current directory more room.
set column_ratios 3,5

# Avoid counting every directory eagerly; this helps navigation stay snappy in
# larger trees.
set automatically_count_files false

# Make / use ranger's built-in incremental search, always case-insensitive.
map / console scout -fltie%space

# Keep two visible columns with the second one used as the preview column.
set collapse_preview false
set preview_directories true
set preview_files true



# Exit ranger and return to the original shell in the current directory.
map S quit
map C code_here
map <C-t> code_here
