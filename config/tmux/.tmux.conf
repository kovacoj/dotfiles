# ~/.tmux.conf

# Prefix
unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

# Keep zsh as the shell inside tmux
set -g default-shell /usr/bin/zsh

# More usable scrollback
set -g history-limit 50000

# Mouse support
set -g mouse on

# Clipboard integration
set -s set-clipboard on
set -s extended-keys on

# Keep repeatable resize/navigation responsive
set -g repeat-time 500
set -sg escape-time 0

# Start window and pane numbering at 1 and keep numbers compact
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Status bar
set -g status-interval 5
set -g status-position bottom
set -g status-style bg=default,fg=white
set -g status-justify absolute-centre
set -g visual-activity off

# Left side: repo name or current directory
set -g status-left '#[fg=blue]#(cd "#{pane_current_path}" 2>/dev/null; repo=$(git rev-parse --show-toplevel 2>/dev/null); if [ -n "$repo" ]; then basename "$repo"; else basename "#{pane_current_path}"; fi) '
set -g status-left-length 50

# Right side: git branch + clean/dirty mark
set -g status-right ' #(cd "#{pane_current_path}" 2>/dev/null || exit; branch=$(git rev-parse --abbrev-ref HEAD 2>/dev/null) || exit; if [ -n "$(git status --porcelain 2>/dev/null)" ]; then mark="#[fg=yellow]●"; else mark="#[fg=green]✓"; fi; printf "#[fg=red]%s %s" "$branch" "$mark")#[fg=white] '
set -g status-right-length 100

# Window list styling
setw -g monitor-activity off
setw -g automatic-rename on
setw -g pane-border-format ''
setw -g window-status-format '#[fg=white]#W'
setw -g window-status-current-format '#[fg=yellow,bold]#W'
setw -g window-status-separator ' │ '

# Easy reload
set -g @config-file '/home/cady/dotfiles/config/tmux/.tmux.conf'
set -g @ranger-start-dir '/home/cady/personal'
bind r source-file #{@config-file} \; move-window -r \; display-message "tmux.conf reloaded"

# vi-style copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# pane movement without prefix
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# pane resizing after prefix
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Open new panes in the current pane's directory
unbind %
bind-key % split-window -h -c '#{pane_current_path}'

unbind '"'
bind-key '"' split-window -v -c '#{pane_current_path}'


# keep clear-screen available
bind C-l send-keys 'C-l'

# Pass Ctrl+Delete through to the shell/editor.
bind-key -n C-DC send-keys C-DC


unbind c
bind-key c command-prompt \
  -p "New window name:" \
  -I "ranger" \
  "new-window -c '/home/cady/personal' -n '%%' 'env TMUX_RANGER_AUTOSTART=1 TMUX_RANGER_START_DIR=/home/cady/personal /usr/bin/zsh -i'"


# Kill pane immediately with prefix + x, no confirmation
unbind-key x
bind-key x kill-pane

# Keep confirmation for killing the current window with prefix + &
unbind-key &
bind-key & confirm-before -p "kill-window #W? (y/n)" kill-window

# Optional: add a confirmed kill-session binding, e.g. prefix + X
bind-key X confirm-before -p "kill-session #S? (y/n)" kill-session

# terminal features
set -g terminal-features 'xterm*:clipboard:ccolour:cstyle:focus:title,screen*:title,rxvt*:ignorefkeys,*:clipboard,*:extkeys'
