# ~/.tmux.conf

# Prefix
unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

# Keep zsh as the shell inside tmux
run-shell 'tmux set-option -gq default-shell "${SHELL:-$(command -v sh)}"'

# More usable scrollback
set -g history-limit 50000

# Mouse support
set -g mouse on

# Clipboard integration
set -s set-clipboard on
set -g allow-passthrough on
set -s extended-keys always

# Keep repeatable resize/navigation responsive
set -g repeat-time 500
set -sg escape-time 0

# Start window and pane numbering at 1 and keep numbers compact
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Status bar
set -g status-interval 5
set -g status-position bottom
set -g status-style bg=default,fg=white
set -g status-justify absolute-centre
set -g visual-activity off

# Left side: session name only
set -g status-left '#[fg=cyan]#S '
set -g status-left-length 50
bind-key -n MouseDown1StatusLeft choose-tree -s

# Right side: current folder and branch when inside a git repo
set -g status-right '#[fg=blue]#("/home/cady/dotfiles/scripts/tmux-path-status.sh" "#{pane_current_path}")#("/home/cady/dotfiles/scripts/tmux-git-bracket.sh" open "#{pane_current_path}")#[fg=red]#("/home/cady/dotfiles/scripts/tmux-git-status.sh" "#{pane_current_path}")#[fg=blue]#("/home/cady/dotfiles/scripts/tmux-git-bracket.sh" close "#{pane_current_path}")#[fg=white] '
set -g status-right-length 100

# Window list styling
setw -g monitor-activity off
setw -g allow-rename off
setw -g automatic-rename off
setw -g xterm-keys on
setw -g pane-border-format ''
setw -g window-status-format '#[fg=white]#W'
setw -g window-status-current-format '#[fg=yellow,bold]#W'
setw -g window-status-separator ' │ '

# Easy reload
bind r run-shell 'tmux source-file "$HOME/dotfiles/config/tmux/.tmux.conf"; tmux move-window -r; tmux display-message "tmux.conf reloaded"'

# vi-style copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# pane movement without prefix
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# pane resizing after prefix
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Open new panes in the current pane's directory
unbind %
bind-key % split-window -h -c '#{pane_current_path}'

unbind '"'
bind-key '"' split-window -v -c '#{pane_current_path}'


# keep clear-screen available
bind C-l send-keys 'C-l'

# Pass Ctrl+Delete through to the shell/editor.
bind-key -n C-DC send-keys C-DC
bind-key -n C-BSpace send-keys C-BSpace


unbind c
bind-key c new-window -n 'new' -c '#{HOME}/personal' '$HOME/dotfiles/scripts/tmux-ranger-shell.sh'


# Kill pane immediately with prefix + x, no confirmation
unbind-key x
bind-key x kill-pane

# Create a fresh ranger-first session and force naming up front.
bind-key N command-prompt -p "New session name:" "run-shell '$HOME/dotfiles/scripts/tmux-new-session.sh \"%%\"'"

# Restore a dead pane or window when needed.
bind-key R respawn-pane
bind-key W respawn-window

# Keep confirmation for killing the current window with prefix + &
unbind-key &
bind-key & confirm-before -p "kill-window #W? (y/n)" kill-window

# Optional: add a confirmed kill-session binding, e.g. prefix + X
bind-key X confirm-before -p "kill-session #S? (y/n)" kill-session

# terminal features
set -g terminal-features 'xterm*:clipboard:ccolour:cstyle:focus:title,screen*:title,rxvt*:ignorefkeys,*:clipboard,*:extkeys'

# Save tmux state on structural changes in the background. This avoids doing
# autosave work on every status-bar redraw while still keeping restore data
# fresh for WSL shutdown or reboot recovery.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-save 'S'
set -g @resurrect-restore 'U'

# Clean up old autosave hooks from earlier config revisions.
set-hook -gu after-kill-pane
set-hook -gu after-new-session
set-hook -gu after-new-window
set-hook -gu after-rename-session
set-hook -gu after-rename-window
set-hook -gu after-resize-pane
set-hook -gu after-select-layout
set-hook -gu after-split-window

run-shell '$HOME/.tmux/plugins/tpm/tpm'
run-shell -b '$HOME/dotfiles/scripts/tmux-resurrect-autosave-loop.sh "#{socket_path}" 1800'

# Keep resurrect on predictable keys that do not fight the custom prefix.
unbind-key C-r
unbind-key U
bind-key S run-shell '$HOME/.tmux/plugins/tmux-resurrect/scripts/save.sh'
bind-key U run-shell '$HOME/.tmux/plugins/tmux-resurrect/scripts/restore.sh'
